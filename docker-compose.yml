name: finanzia

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm run dev -- --hostname 0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-replace-with-local-anon-key}
      OCR_SERVICE_URL: http://ocr:8010
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - ocr

  ocr:
    image: python:3.12-slim
    working_dir: /app
    command: python -m http.server 8010
    ports:
      - "${OCR_SERVICE_PORT:-8010}:8010"
    volumes:
      - ./backend/ocr:/app:ro

volumes:
  frontend_node_modules:
